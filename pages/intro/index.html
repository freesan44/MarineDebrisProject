<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本沿岸の海洋ゴミと生態系インタラクティブ</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body data-page="intro">
  <header class="hero">
    <div class="hero-content">
      <div class="hero-top">
        <p class="eyebrow" data-i18n="heroEyebrow">守护日本周边海洋</p>
      </div>
      <h1 data-i18n="heroTitle">海洋垃圾对日本沿海环境的影响</h1>
      <p data-i18n="heroSubtitle">通过浮游塑料、渔具、饮料瓶等实例，体验不断增加的垃圾对海洋生命的负担。</p>
      <button class="cta-button" id="startExperience" data-i18n="startButton">开始体验</button>
    </div>
    <div class="ocean-scene polluted" aria-hidden="true">
      <div class="wave wave1"></div>
      <div class="wave wave2"></div>
      <div class="debris floating debris1">🧴</div>
      <div class="debris floating debris2">🥤</div>
      <div class="debris floating debris3">🗑️</div>
      <div class="debris floating debris4">🐟</div>
    </div>
  </header>

  <main>
    <section class="section intro" id="intro-page">
      <h2 data-i18n="introTitle">インタラクティブで学ぶ</h2>
      <p data-i18n="introText">このページでは、アニメーション、ドラッグ＆ドロップ、データビジュアライゼーションを使って、日本周辺の海洋ゴミ問題を体験できます。</p>
    </section>
  </main>

  <script src="../../layout.js"></script>
  <script src="../../script.js"></script>
</body>
</html>
