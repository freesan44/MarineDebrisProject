<!DOCTYPE html>
<!-- 海洋垃圾项目 - 参与变化页面 / Marine Debris Project - Cleanup Page -->
<!-- 此页面展示个人和社区参与海洋清理的实际案例和影响 -->
<!-- This page shows real cases and impacts of personal and community participation in marine cleanup -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>参与变化 | Marine Debris Project</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body data-page="cleanup">
  <main>
    <section class="section cleanup-impact cleanup-redesign" id="cleanup-page">
      <div class="cleanup-hero">
        <div>
          <p class="section-kicker" data-i18n="cleanupKicker">参与变化</p>
          <h2 data-i18n="impactInteractiveTitle">亲手参与，观察变化</h2>
          <p data-i18n="impactInteractiveDescription">每次清理动作都会改变水质和生机，体验“手动修复”的过程。</p>
        </div>
        <div class="cleanup-hero-card">
          <span data-i18n="cleanupHeroLabel">模拟体验</span>
          <strong data-i18n="cleanupHeroValue">当前 · 部分 · 完全</strong>
          <small data-i18n="cleanupHeroNote">切换清理程度，观察水质、垃圾量和海洋生物状态如何变化。</small>
        </div>
      </div>
      <div class="impact-interactive">
        <div class="impact-visual" id="impactVisual">
          <div class="impact-stage before"><span data-i18n="beforeLabel">清理前</span></div>
          <div class="impact-stage after"><span data-i18n="afterLabel">清理后</span></div>
        </div>
        <div class="impact-status">
          <div class="status-meter" aria-hidden="true"><div class="status-fill" id="statusFill"></div></div>
          <p id="statusText" data-i18n="statusText">水质恢复: 0%</p>
          <div class="simulation-panel">
            <h3 data-i18n="simulationTitle">模拟影响</h3>
            <div class="simulation-controls">
              <button class="simulation-button active" type="button" data-scenario="current" data-i18n="simulationCurrent">当前状态</button>
              <button class="simulation-button" type="button" data-scenario="partial" data-i18n="simulationPartial">部分清理</button>
              <button class="simulation-button" type="button" data-scenario="full" data-i18n="simulationFull">完全清理</button>
            </div>
            <div class="simulation-preview">
              <img id="simulationImage" src="../../assets/generated/simulation-current.png" alt="Polluted ocean water with plastic debris" loading="lazy" />
              <p id="simulationImageCaption">污染的海洋与漂浮垃圾</p>
            </div>
            <div class="simulation-results">
              <p><strong data-i18n="debrisLevelLabel">垃圾量</strong>: <span id="debrisLevelText">80%</span></p>
              <p><strong data-i18n="marineLifeLabel">海洋生物</strong>: <span id="marineLifeText">受损</span></p>
              <p><strong data-i18n="waterColorLabel">海水</strong>: <span id="waterColorText">浑浊</span></p>
            </div>
          </div>
        </div>
      </div>
      <div class="impact-gallery">
        <figure class="impact-photo-card">
          <img src="../../assets/generated/simulation-current.png" alt="海岸清理前的污染水体" loading="lazy" />
          <figcaption data-i18n="impactPhoto1">清理前：垃圾较多的沿岸水体</figcaption>
        </figure>
        <figure class="impact-photo-card">
          <img src="../../assets/generated/simulation-partial.png" alt="部分清理后的海岸" loading="lazy" />
          <figcaption data-i18n="impactPhoto2">部分清理：正在恢复的海洋</figcaption>
        </figure>
        <figure class="impact-photo-card">
          <img src="../../assets/generated/simulation-full.png" alt="完全清理后的健康海洋" loading="lazy" />
          <figcaption data-i18n="impactPhoto3">完全清理：健康的海洋环境</figcaption>
        </figure>
      </div>
      <p class="image-source" data-i18n="cleanupImageNote">以上图片为基于海洋清理主题生成的模拟图像。</p>
    </section>
  </main>

  <script src="../../layout.js"></script>
  <script src="../../shared.js"></script>
  <script src="cleanup.js"></script>
</body>
</html>
