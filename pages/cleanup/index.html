<!DOCTYPE html>
<!-- 海洋垃圾项目 - 参与变化页面 / Marine Debris Project - Cleanup Page -->
<!-- 此页面展示个人和社区参与海洋清理的实际案例和影响 -->
<!-- This page shows real cases and impacts of personal and community participation in marine cleanup -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>参与变化 | Marine Debris Project</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body data-page="cleanup">
  <main>
    <section class="section cleanup-impact" id="cleanup-page">
      <div class="section-head">
        <h2 data-i18n="impactInteractiveTitle">亲手参与，观察变化</h2>
        <p data-i18n="impactInteractiveDescription">每次清理动作都会改变水质和生机，体验“手动修复”的过程。</p>
      </div>
      <div class="impact-interactive">
        <div class="impact-visual" id="impactVisual">
          <div class="impact-stage before"><span data-i18n="beforeLabel">清理前</span></div>
          <div class="impact-stage after"><span data-i18n="afterLabel">清理后</span></div>
        </div>
        <div class="impact-status">
          <div class="status-meter" aria-hidden="true"><div class="status-fill" id="statusFill"></div></div>
          <p id="statusText" data-i18n="statusText">水质恢复: 0%</p>
          <button id="shareButton" class="share-button" data-i18n="shareButton">分享你的海洋守护成果</button>
        </div>
      </div>
      <div class="impact-gallery">
        <figure class="impact-photo-card">
          <img src="https://kanto.env.go.jp/content/000061845.png" alt="海岸清理现场" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://kanto.env.go.jp/content/900155040.jpg';this.onerror=null;" />
          <figcaption data-i18n="impactPhoto1">海岸清理作业现场（环境省）</figcaption>
        </figure>
        <figure class="impact-photo-card">
          <img src="https://chubu.env.go.jp/content/900118204.jpg" alt="清理前后对比" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://chubu.env.go.jp/content/900118205.jpg';this.onerror=null;" />
          <figcaption data-i18n="impactPhoto2">国立公园海岸清理前后对比</figcaption>
        </figure>
        <figure class="impact-photo-card">
          <img src="https://chubu.env.go.jp/content/900103150.jpg" alt="回收海洋垃圾" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://chubu.env.go.jp/content/900106976.jpg';this.onerror=null;" />
          <figcaption data-i18n="impactPhoto3">回收海洋垃圾与分类处理</figcaption>
        </figure>
      </div>
      <p class="image-source" data-i18n="cleanupImageNote">以上照片来自日本环境省地方环境事务所公开资料。</p>
    </section>
  </main>

  <script src="../../layout.js"></script>
  <script src="../../script.js"></script>
</body>
</html>
