<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>影响区域 | Marine Debris Project</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body data-page="impact">
  <main>
    <section class="section impact" id="impact-page">
      <div class="section-head">
        <h2 data-i18n="impactTitle">日本の海に近い場所での影響</h2>
        <p data-i18n="impactDescription">北海道から沖縄まで、日本沿岸のゴミが海洋生物や沿岸コミュニティに与える影響を見ていきましょう。</p>
      </div>
      <div class="impact-grid">
        <article>
          <h3 data-i18n="impactNorthTitle">北日本</h3>
          <p data-i18n="impactNorthText">プラスチック片が流氷とともに漂着し、海鳥やアザラシに危険をもたらしています。</p>
        </article>
        <article>
          <h3 data-i18n="impactWestTitle">西日本</h3>
          <p data-i18n="impactWestText">九州や瀬戸内海では、漁具やビニールが漁業資源に悪影響を与えています。</p>
        </article>
        <article>
          <h3 data-i18n="impactSouthTitle">南西諸島</h3>
          <p data-i18n="impactSouthText">珊瑚礁周辺でのプラスチック破片やマイクロプラスチックが生態系ストレスを高めています。</p>
        </article>
      </div>
    </section>
  </main>

  <script src="../../layout.js"></script>
  <script src="../../script.js"></script>
</body>
</html>
