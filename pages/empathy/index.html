<!DOCTYPE html>
<!-- 海洋垃圾项目 - 影像页面 / Marine Debris Project - Empathy Page -->
<!-- 此页面展示海洋垃圾影响的视觉内容，帮助用户建立情感联系 -->
<!-- This page displays visual content about marine debris impact to help users build emotional connection -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>海洋影像 | Marine Debris Project</title>
  <link rel="stylesheet" href="../../styles.css?v=20260718-7" />
</head>
<body data-page="empathy">
  <main>
    <section class="section empathy empathy-redesign" id="empathy-page">
      <!-- 页面标题卡：说明影像页的观察目标与阅读重点。 -->
      <div class="empathy-hero">
        <div>
          <p class="section-kicker" data-i18n="empathyKicker">影像观察</p>
          <h2 data-i18n="empathyTitle">用真实影像看见日本沿岸海洋垃圾</h2>
          <p data-i18n="empathyDescription">通过视频和日本沿岸图片，把抽象的海洋垃圾问题变成可以看见、可以感受、可以讨论的现实场景。</p>
        </div>
        <div class="empathy-hero-card">
          <span data-i18n="empathyHeroLabel">观看重点</span>
          <strong data-i18n="empathyHeroValue">路径 · 生物 · 海岸</strong>
          <small data-i18n="empathyHeroNote">先看垃圾如何进入海洋，再看它与沿岸风景、生态和人类活动的关系。</small>
        </div>
      </div>
      <!-- 主题视频使用用户指定的 YouTube 嵌入地址。 -->
      <div class="video-feature">
        <div class="video-copy">
          <p class="section-kicker" data-i18n="videoKicker">主题视频</p>
          <h3 data-i18n="videoTitle">塑料如何进入海洋生态链</h3>
          <p data-i18n="videoDescription">通过短视频理解塑料垃圾从日常生活进入河流、海湾和海洋生物体内的路径。</p>
        </div>
        <div class="video-frame">
          <iframe width="560" height="315" src="https://www.youtube.com/embed/_6xlNyWPpB8?si=l1zaZWYrgUDmkZ1S" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
      </div>
      <!-- 日本环境省相关公开影像；点击卡片由 empathy.js 在新标签打开原图。 -->
      <div class="image-grid">
        <figure class="image-card">
          <img src="https://chushikoku.env.go.jp/park/daisen/viewpoint/img/kuniga_coast/view_temple1.jpg" alt="日本海岸の風景" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://chushikoku.env.go.jp/content/000037087.jpg';this.onerror=null;" />
          <figcaption data-i18n="imageCaption1">北海道の漁村と漂着ゴミ</figcaption>
        </figure>
        <figure class="image-card">
          <img src="https://chushikoku.env.go.jp/park/daisen/viewpoint/img/kuniga_coast/view_temple2.jpg" alt="沖縄の珊瑚礁" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://chushikoku.env.go.jp/content/900106973.jpg';this.onerror=null;" />
          <figcaption data-i18n="imageCaption2">沖縄近海の珊瑚と海の生き物</figcaption>
        </figure>
        <figure class="image-card">
          <img src="https://chushikoku.env.go.jp/park/daisen/viewpoint/img/kuniga_coast/view_temple3.jpg" alt="漁師と海" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='https://chubu.env.go.jp/content/900103147.jpg';this.onerror=null;" />
          <figcaption data-i18n="imageCaption3">地域漁業と海洋環境のつながり</figcaption>
        </figure>
      </div>
      <p class="image-source" data-i18n="officialImageNote">图片来源：日本环境省（環境省）公开页面。</p>
    </section>
  </main>

  <!-- 共用布局和翻译必须先于页面交互脚本加载。 -->
  <script src="../../layout.js?v=20260718-7"></script>
  <script src="../../shared.js?v=20260718-7"></script>
  <script src="empathy.js?v=20260718-7"></script>
</body>
</html>
