<!--
海洋垃圾项目 - 日本地图SVG
Marine Debris Project - Japan Map SVG

此SVG文件包含日本地图的矢量图形，用于在地图页面显示地理背景。
This SVG file contains vector graphics of Japan map, used to display geographical background on the map page.

技术规格：
- 尺寸：800x1000像素
- 坐标系：适合叠加DOM标记点
- 渐变：海洋和陆地颜色过渡

Technical specifications:
- Size: 800x1000 pixels
- Coordinate system: Suitable for overlaying DOM marker points
- Gradients: Ocean and land color transitions

依赖：
- map.js (坐标转换和标记叠加)

Dependencies:
- map.js (coordinate conversion and marker overlay)
-->
<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8e4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7ebeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="landGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d6f6d7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#98d5a2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Ocean background -->
  <rect width="800" height="1000" fill="url(#oceanGradient)" />

  <!-- Japan landmass -->
  <path d="M400 50 Q380 30 420 20 L430 60 Q410 75 395 70 Z" fill="url(#landGradient)" stroke="#4a90e2" stroke-width="2"/>
  <path d="M395 120 Q385 100 370 110 L365 140 Q385 150 402 138 Z" fill="url(#landGradient)" stroke="#4a90e2" stroke-width="2"/>
  <path d="M390 200 Q380 180 365 195 L370 225 Q390 235 410 218 Z" fill="url(#landGradient)" stroke="#4a90e2" stroke-width="2"/>
  <path d="M360 280 Q365 260 380 265 L400 275 Q420 265 430 250 L440 230 Q455 215 470 225 L480 250 Q465 270 445 275 Q425 285 405 280 Z" fill="url(#landGradient)" stroke="#4a90e2" stroke-width="2"/>
  <path d="M375 360 Q370 340 390 330 L410 342 Q430 354 455 350 L470 332 Q455 312 430 308 L410 306 Q390 304 375 318 Z" fill="url(#landGradient)" stroke="#4a90e2" stroke-width="2"/>
  <path d="M385 440 Q378 420 395 408 L418 414 Q436 422 456 416 L472 432 Q455 452 435 458 L415 460 Q390 464 375 448 Z" fill="url(#landGradient)" stroke="#4a90e2" stroke-width="2"/>
  <path d="M390 520 Q388 500 404 490 L426 494 Q448 498 465 488 L482 502 Q465 522 445 526 L425 530 Q398 536 378 524 Z" fill="url(#landGradient)" stroke="#4a90e2" stroke-width="2"/>
</svg>