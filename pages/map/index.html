<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地图分析 | Marine Debris Project</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>
<body data-page="map">
  <main>
    <section class="section map" id="map-page">
      <div class="section-head">
        <h2 id="mapTitle" data-i18n="mapTitle">日本沿岸のゴミ分布マップ</h2>
        <p data-i18n="mapDescription">日本周辺の沿岸で観測されたゴミ濃度を地域別に表示し、海洋生態系への影響を確認できます。</p>
      </div>
      <div class="map-panel">
        <div class="map-container" aria-label="日本の海洋ゴミマップ">
          <svg viewBox="0 0 260 760" class="japan-map" role="img" aria-labelledby="mapTitle">
            <rect x="0" y="0" width="260" height="760" fill="url(#oceanGradient)" />
            <defs>
              <linearGradient id="oceanGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#b8e4ff" />
                <stop offset="100%" stop-color="#7ebeff" />
              </linearGradient>
              <linearGradient id="landGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#d6f6d7" />
                <stop offset="100%" stop-color="#98d5a2" />
              </linearGradient>
            </defs>
            <g class="terrain">
              <path d="M90 30 C80 10, 110 0, 140 20 L142 50 C120 65, 105 60, 90 50 Z" fill="url(#landGradient)" />
              <path d="M90 90 C82 78, 75 88, 80 100 L86 120 C105 130, 122 118, 130 100 C140 85, 145 93, 150 110 L158 132 C170 150, 135 158, 118 145 Z" fill="url(#landGradient)" />
              <path d="M90 168 C85 158, 80 170, 82 185 L88 205 C102 215, 122 214, 140 198 L148 190 C160 184, 170 186, 178 202 L188 220 C205 238, 190 248, 170 244 C150 240, 140 228, 132 214 Z" fill="url(#landGradient)" />
              <path d="M70 250 C72 236, 78 230, 92 232 L108 236 C132 242, 150 230, 160 210 L170 192 C186 176, 200 180, 210 198 L220 220 C240 250, 235 268, 220 282 C200 298, 176 294, 160 276 L150 264 C135 252, 118 248, 102 256 Z" fill="url(#landGradient)" />
              <path d="M75 340 C70 320, 90 300, 110 310 L130 322 C150 334, 175 330, 192 312 L210 296 C228 280, 215 260, 190 256 L170 254 C150 252, 138 244, 120 238 Z" fill="url(#landGradient)" />
              <path d="M85 430 C78 410, 95 398, 118 404 L142 410 C160 418, 180 412, 196 426 L212 442 C230 458, 220 478, 198 486 L178 488 C150 492, 124 482, 110 460 Z" fill="url(#landGradient)" />
              <path d="M90 520 C88 500, 104 490, 126 494 L148 498 C170 502, 187 492, 204 506 L222 520 C238 532, 230 550, 210 556 L190 560 C162 566, 138 560, 118 548 Z" fill="url(#landGradient)" />
            </g>
            <g class="region" data-region="hokkaido" role="button" tabindex="0" aria-label="北海道">
              <path d="M95 30 C100 18, 120 12, 138 24 C142 38, 128 45, 115 44 C102 43, 97 35, 95 30 Z" />
              <text x="118" y="30" text-anchor="middle" class="map-region-label">北海道</text>
            </g>
            <g class="region" data-region="tohoku" role="button" tabindex="0" aria-label="東北">
              <path d="M96 94 C100 84, 110 80, 124 88 C130 98, 122 110, 112 110 C102 110, 96 102, 96 94 Z" />
              <text x="118" y="103" text-anchor="middle" class="map-region-label">東北</text>
            </g>
            <g class="region" data-region="kanto" role="button" tabindex="0" aria-label="関東">
              <path d="M98 175 C104 166, 118 162, 128 170 C135 180, 130 192, 118 192 C106 192, 98 184, 98 175 Z" />
              <text x="118" y="181" text-anchor="middle" class="map-region-label">関東</text>
            </g>
            <g class="region" data-region="chubu" role="button" tabindex="0" aria-label="中部">
              <path d="M82 252 C88 244, 104 242, 122 248 C140 254, 146 266, 136 276 C126 286, 108 286, 94 278 C82 270, 80 258, 82 252 Z" />
              <text x="118" y="262" text-anchor="middle" class="map-region-label">中部</text>
            </g>
            <g class="region" data-region="kansai" role="button" tabindex="0" aria-label="関西">
              <path d="M84 344 C94 334, 112 332, 128 342 C138 352, 134 366, 120 370 C106 374, 92 366, 84 356 C84 350, 84 348, 84 344 Z" />
              <text x="118" y="354" text-anchor="middle" class="map-region-label">関西</text>
            </g>
            <g class="region" data-region="chugoku_shikoku" role="button" tabindex="0" aria-label="中国・四国">
              <path d="M78 422 C86 412, 104 410, 120 418 C132 426, 130 438, 118 444 C104 450, 90 446, 80 438 C78 434, 78 428, 78 422 Z" />
              <text x="118" y="433" text-anchor="middle" class="map-region-label">中国・四国</text>
            </g>
            <g class="region" data-region="kyushu_okinawa" role="button" tabindex="0" aria-label="九州・沖縄">
              <path d="M86 530 C96 520, 114 516, 130 526 C142 536, 140 550, 128 556 C116 562, 100 558, 90 548 C88 544, 86 536, 86 530 Z" />
              <text x="118" y="536" text-anchor="middle" class="map-region-label">九州・沖縄</text>
            </g>
            <g class="map-icons">
              <text x="72" y="70" class="map-icon">🐟</text>
              <text x="178" y="220" class="map-icon">🚢</text>
              <text x="92" y="410" class="map-icon">🦀</text>
              <text x="138" y="540" class="map-icon">🌊</text>
            </g>
          </svg>
          <div class="map-key">
            <div><span class="map-color low"></span><span data-i18n="mapLow">低</span></div>
            <div><span class="map-color medium"></span><span data-i18n="mapMedium">中</span></div>
            <div><span class="map-color high"></span><span data-i18n="mapHigh">高</span></div>
          </div>
        </div>
        <div class="map-detail" id="mapDetail"></div>
      </div>
    </section>
  </main>

  <script src="../../layout.js"></script>
  <script src="../../script.js"></script>
</body>
</html>
